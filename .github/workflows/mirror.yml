name: Mirror to GitLab

on:
  push:
    branches:
      - '**'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          git remote add mirror https://oauth2:${GITLAB_MIRROR_TOKEN}@gitlab.acreetionos.org/natalie/qt-calculator.git
          git push mirror --all --force
          git push mirror --tags --force
        env:
          GITLAB_MIRROR_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
